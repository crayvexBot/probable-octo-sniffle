<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>console: Live</title>

<style>
body {
  background: black;
  color: #00ff88;
  font-family: monospace;
}

#box {
  padding: 20px;
}

input {
  width: 80%;
  padding: 10px;
  background: #111;
  color: #00ff88;
  border: 1px solid #00ff88;
}

button {
  padding: 10px;
  background: #00ff88;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="box">
  <h2>AprilGPT (HF)</h2>

  <div id="chat"></div>

  <input id="input" placeholder="Ask something..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://YOUR-RENDER-URL.onrender.com/chat";

async function send() {
  const input = document.getElementById("input");
  const msg = input.value;
  if (!msg) return;

  add("You: " + msg);
  input.value = "";

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    add("AprilGPT: " + data.reply);

  } catch (e) {
    add("AprilGPT: ❌ server error");
  }
}

function add(text) {
  const div = document.createElement("div");
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
