<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AprilGPT</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
}

/* TOP BADGE */
#badge {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(255,255,0,0.15);
  border: 1px solid yellow;
  color: yellow;
  padding: 8px 12px;
  font-size: 12px;
  z-index: 9999;
}

/* SCREENS */
.screen {
  display: none;
  padding: 30px;
}

#boot { display: block; }

/* INPUTS */
input {
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 12px;
  width: 250px;
}

/* BUTTONS */
button {
  background: #00ff88;
  border: none;
  padding: 12px;
  cursor: pointer;
}

/* CHAT BIG UI */
#chatBox {
  display: flex;
  flex-direction: column;
  height: 80vh;
}

#messages {
  flex: 1;
  overflow-y: auto;
  border: 1px solid #00ff88;
  padding: 15px;
  font-size: 15px;
}

#inputArea {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

#msg {
  flex: 1;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="badge">🟡 APRIL FOOLS GPT — SIMULATION MODE</div>

<!-- BOOT -->
<div id="boot" class="screen">
  <h2>Loading April Virus...</h2>
  <p style="color:orange;">
    WARNING: This is NOT a virus. This is a harmless simulation.
  </p>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen">
  <h2>System Sign Up</h2>
  <input id="user" placeholder="username"><br><br>
  <input id="pass" type="password" placeholder="password"><br><br>
  <button onclick="signup()">Enter System</button>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <h2>AprilGPT Terminal</h2>

  <div id="chatBox">
    <div id="messages"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Type message..." />
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<!-- SOUNDS -->
<audio id="bootSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="sendSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="errorSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
let username = "";

// BOOT SOUND
document.getElementById("bootSound").play();

// BOOT SEQUENCE
setTimeout(() => {
  document.getElementById("boot").style.display = "none";
  document.getElementById("signup").style.display = "block";
}, 2500);

// SIGNUP FUNCTION
async function signup() {
  username = document.getElementById("user").value;

  const res = await fetch("https://aprilgpt.onrender.com/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: username,
      password: document.getElementById("pass").value
    })
  });

  const data = await res.json();
  alert(data.message);

  document.getElementById("signup").style.display = "none";
  document.getElementById("chat").style.display = "block";
}

// TYPE EFFECT
function type(text) {
  let i = 0;
  const div = document.createElement("div");
  document.getElementById("messages").appendChild(div);

  const t = setInterval(() => {
    div.innerText = "AprilGPT: " + text.slice(0, i);
    i++;
    if (i > text.length) clearInterval(t);
  }, 10);
}

// SEND FUNCTION (FIXED)
async function send() {
  const msg = document.getElementById("msg").value;

  document.getElementById("sendSound").play();

  const res = await fetch("https://aprilgpt.onrender.com/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: msg,
      username: username
    })
  });

  const data = await res.json();
  type(data.reply);
}
</script>

</body>
</html>
