<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AprilGPT</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
}

#badge {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(255,255,0,0.15);
  border: 1px solid yellow;
  color: yellow;
  padding: 8px 12px;
  font-size: 12px;
  z-index: 9999;
}

.screen {
  display: none;
  padding: 30px;
}

#boot { display: block; }

input {
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 12px;
  width: 250px;
}

button {
  background: #00ff88;
  border: none;
  padding: 12px;
  cursor: pointer;
}

#chatBox {
  display: flex;
  flex-direction: column;
  height: 80vh;
}

#messages {
  flex: 1;
  overflow-y: auto;
  border: 1px solid #00ff88;
  padding: 15px;
  font-size: 15px;
}

#inputArea {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

#msg {
  flex: 1;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="badge">🟡 APRIL FOOLS GPT — SIMULATION MODE</div>

<!-- BOOT -->
<div id="boot" class="screen">
  <h2>Loading April Virus...</h2>
  <p style="color:orange;">This is NOT a virus. Simulation only.</p>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen">
  <h2>System Sign Up</h2>
  <input id="user" placeholder="username"><br><br>
  <input id="pass" type="password" placeholder="password"><br><br>
  <button onclick="signup()">Enter System</button>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <h2>AprilGPT Terminal</h2>

  <div id="chatBox">
    <div id="messages"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Type message..." />
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<!-- SOUNDS -->
<audio id="sendSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let username = "";

/* BOOT */
setTimeout(() => {
  document.getElementById("boot").style.display = "none";
  document.getElementById("signup").style.display = "block";
}, 2500);

/* SIGNUP */
async function signup() {
  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();

  if (!u || !p) return alert("Fill fields");

  username = u;

  const res = await fetch("https://aprilgpt.onrender.com/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username: u, password: p })
  });

  const data = await res.json();
  alert(data.message);

  document.getElementById("signup").style.display = "none";
  document.getElementById("chat").style.display = "block";
}

/* CHAT RENDER */
function addMessage(text, who) {
  const div = document.createElement("div");
  div.innerText = who + ": " + text;
  document.getElementById("messages").appendChild(div);
}

/* SEND */
async function send() {
  const input = document.getElementById("msg");
  const msg = input.value.trim();

  if (!msg) return;

  addMessage(msg, "You");
  input.value = "";

  document.getElementById("sendSound").play();

  const res = await fetch("https://aprilgpt.onrender.com/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message: msg,
      username: username
    })
  });

  const data = await res.json();
  addMessage(data.reply, "AprilGPT");
}
</script>

</body>
</html>
