<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April Fools GPT</title>
<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#chat {
    width: 420px;
    height: 520px;
    background: #1e1e1e;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}
.msg { margin: 6px 0; }
.user { color: #4fc3f7; }
.bot { color: #ffcc80; }
#inputArea {
    display: flex;
}
input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}
button {
    padding: 10px;
    border: none;
    background: #ff9800;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="chat">
    <div id="messages"></div>
    <div id="inputArea">
        <input id="input" placeholder="Talk to April Fools GPT...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
const API_KEY = "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"; // ⚠️ DO NOT expose in public GitHub Pages

const systemPrompt = `
You are "April Fools GPT".
Personality:
- sarcastic but friendly
- sometimes confused in a funny way
- acts like a powerful AI but slightly unreliable
- NEVER insults or uses harmful language
- always family-friendly
- occasionally jokes about being wrong or glitching
- keeps answers short and funny
`;

async function askAI(userText) {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
                { role: "system", content: systemPrompt },
                { role: "user", content: userText }
            ]
        })
    });

    const data = await res.json();
    return data.choices?.[0]?.message?.content || "AI glitched... try again.";
}

function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = 999999;
}

async function sendMsg() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMsg("You: " + text, "user");
    input.value = "";

    addMsg("April Fools GPT: thinking...", "bot");

    const reply = await askAI(text);

    // remove "thinking..."
    const msgs = document.getElementById("messages");
    msgs.removeChild(msgs.lastChild);

    addMsg("April Fools GPT: " + reply, "bot");
}
</script>

</body>
</html>
